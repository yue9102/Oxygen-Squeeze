name: Build APK & Release

# 打 v* 标签时触发：云端构建 Android APK 并挂到 GitHub Release。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build web (points app at deployed backend)
        working-directory: frontend
        # VITE_API_BASE 是仓库变量（Settings → Secrets and variables → Actions → Variables）
        # 指向已部署的后端，如 https://oxygen-squeeze.onrender.com
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          npm run build
          npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p out
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             out/氧气捏捏-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 氧气捏捏 ${{ github.ref_name }}
          files: out/*.apk
          body: |
            ## 氧气捏捏 ${{ github.ref_name }}

            ### 📱 安卓下载
            下方 Assets 里的 `.apk` 文件，下载后在手机上安装即可（需允许「未知来源」）。

            ### 🍎 iPhone
            浏览器打开已部署的网址 → 分享 → 「添加到主屏幕」，即可像 App 一样使用。

            > 首次使用前，请确认后端已部署，且仓库变量 `VITE_API_BASE` 指向后端地址。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
