# Render 蓝图：一个 Docker 服务同时托管后端 API 和可安装的 PWA。
# 用法：登录 render.com → New → Blueprint → 连接此仓库 → 部署，
# 然后在服务的 Environment 里填入 DEEPSEEK_API_KEY。
services:
  - type: web
    name: oxygen-squeeze
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false   # 在 Render 控制台手动填入，不写进仓库
